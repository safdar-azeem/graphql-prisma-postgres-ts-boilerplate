type Query
type Mutation
scalar Any

scalar JSON
scalar Upload
scalar ObjectId
scalar DateTime

type PaginationInfo {
  currentPage: Int!
  totalPages: Int!
  totalItems: Int!
}

input PaginationInput {
  page: Int = 1
  limit: Int = 10
}

input DateRangeInput {
  from: DateTime
  to: DateTime
}

input AttachmentInput {
  fileName: String!
  fileUrl: String!
  fileType: String!
  fileSize: Float
}

type AttachmentFile {
  fileName: String
  fileUrl: String
  fileType: String
  fileSize: Float
}

# Must stay in sync with Prisma Permission enum in prisma/schema/enums.prisma
enum Permissions {
  USER_VIEW
  USER_CREATE
  USER_UPDATE
  USER_DELETE
  ROLE_VIEW
  ROLE_CREATE
  ROLE_UPDATE
  ROLE_DELETE
}
