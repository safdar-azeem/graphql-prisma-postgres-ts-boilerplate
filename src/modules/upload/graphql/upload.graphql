enum FileStatus {
  PENDING
  UPLOADED
  FAILED
  DELETED
}

type File {
  id: ID!
  filename: String!
  originalName: String!
  mimeType: String!
  size: Int!
  status: FileStatus!
  url: String
  folderId: String
  isPublic: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Folder {
  id: ID!
  name: String!
  path: String!
  parentId: String
  isPublic: Boolean!
  files: [File!]
  children: [Folder!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SignedUploadUrl {
  signedUrl: String!
  fileId: String!
  publicUrl: String!
  storageKey: String!
  expiresAt: DateTime!
}

type FileConnection {
  items: [File!]!
  pageInfo: PaginationInfo!
}

type FolderConnection {
  items: [Folder!]!
  pageInfo: PaginationInfo!
}

type ResourceShareLink {
  id: ID!
  token: String!
  url: String!
  fileId: String
  folderId: String
  expiresAt: DateTime!
  createdAt: DateTime!
}

type ResourceShareLinkConnection {
  items: [ResourceShareLink!]!
  pageInfo: PaginationInfo!
}

input RequestUploadInput {
  filename: String!
  mimeType: String!
  size: Int!
  folderId: String
  folderName: String
  isPublic: Boolean
}

input CreateFolderInput {
  name: String!
  parentId: String
  isPublic: Boolean
}

input FilesFilterInput {
  uploadedBy: String
  dateRange: DateRangeInput
  folderId: String
}

input FolderFilterInput {
  parentId: String
  dateRange: DateRangeInput
}

input ShareLinkFilterInput {
  dateRange: DateRangeInput
}

input ShareLinkInput {
  fileId: String
  folderId: String
  expiresInMinutes: Int
}

extend type Query {
  getFile(id: ID!): File
  getFiles(pagination: PaginationInput, search: String, filter: FilesFilterInput): FileConnection!
  
  getFolder(id: ID!): Folder
  getFolders(pagination: PaginationInput, search: String, filter: FolderFilterInput): FolderConnection!
  
  getFileDownloadUrl(id: ID!): String!
  
  getFileShareLinks(fileId: ID!, pagination: PaginationInput, search: String, filter: ShareLinkFilterInput): ResourceShareLinkConnection!
  getFolderShareLinks(folderId: ID!, pagination: PaginationInput, search: String, filter: ShareLinkFilterInput): ResourceShareLinkConnection!
}

extend type Mutation {
  requestUploadUrl(input: RequestUploadInput!): SignedUploadUrl!
  confirmUpload(fileId: ID!): File!
  cancelUpload(fileId: ID!): Boolean!

  deleteFiles(ids: [String!]!): String!
  toggleFilePublic(id: ID!): File!

  createFolder(input: CreateFolderInput!): Folder!
  renameFolder(id: ID!, name: String!): Folder!
  moveFolder(id: ID!, parentId: String): Folder!
  deleteFolder(id: ID!): Boolean!

  createShareLink(input: ShareLinkInput!): ResourceShareLink!
  deleteShareLink(id: ID!): Boolean!
}
