type Role {
  id: ID!
  name: String!
  ownerId: String!
  permissions: [Permissions!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type RoleConnection {
  items: [Role!]!
  pageInfo: PaginationInfo!
}

input RoleFilterInput {
  dateRange: DateRangeInput
}

input CreateRoleInput {
  name: String!
  permissions: [Permissions!]!
}

input UpdateRoleInput {
  name: String
  permissions: [Permissions!]
}

extend type Query {
  getRoles(pagination: PaginationInput, search: String, filter: RoleFilterInput): RoleConnection!
  getRole(id: ID!): Role!
}

extend type Mutation {
  createRole(data: CreateRoleInput!): Role!
  updateRole(id: ID!, data: UpdateRoleInput!): Role!
  deleteRole(id: ID!): Boolean!
}
