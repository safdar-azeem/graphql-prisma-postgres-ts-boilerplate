type MfaSettings {
  isEnabled: Boolean!
  method: TwoFactorMethod
}

type User {
  id: ID!
  email: String!
  username: String!
  avatar: String
  userType: UserType!
  permissions: [Permissions!]!
  mfaSettings: MfaSettings
  createdAt: DateTime!
  updatedAt: DateTime!
}

input UpdateUserProfileInput {
  username: String
  avatar: String
}

extend type Query {
  me: User
}

extend type Mutation {
  updateUserProfile(data: UpdateUserProfileInput!): User!
}
